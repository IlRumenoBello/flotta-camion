<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlottaManager — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN -->
  <div id="loginScreen" class="login-screen">
    <div class="login-bg-grid"></div>
    <div class="login-box">
      <div class="login-logo">
        <div class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 3h15v13H1zM16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        </div>
        <span>FlottaManager</span>
      </div>
      <h1>Bentornato</h1>
      <p class="login-sub">Accedi per gestire la tua flotta</p>
      <div id="loginError" class="error-msg" style="display:none"></div>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="tuaemail@esempio.com" autocomplete="email">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button id="loginBtn" onclick="doLogin()">
        <span>Accedi</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>

    </div>
  </div>

  <!-- APP -->
  <div id="appScreen" style="display:none">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 3h15v13H1zM16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        </div>
        <span>FlottaManager</span>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </button>
        <button class="nav-item" onclick="showPage('viaggi')" id="nav-viaggi">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          Viaggi
        </button>
        <button class="nav-item" onclick="showPage('storico')" id="nav-storico">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Storico
        </button>
        <button class="nav-item" onclick="showPage('costi')" id="nav-costi">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
          Costi
        </button>
        <button class="nav-item" onclick="showPage('camion')" id="nav-camion">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 3h15v13H1zM16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
          Camion
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="period-selector">
          <select id="monthSelect" onchange="onPeriodChange()">
            <option>Gennaio</option><option>Febbraio</option><option>Marzo</option>
            <option>Aprile</option><option>Maggio</option><option>Giugno</option>
            <option>Luglio</option><option>Agosto</option><option>Settembre</option>
            <option>Ottobre</option><option>Novembre</option><option>Dicembre</option>
          </select>
          <select id="yearSelect" onchange="onPeriodChange()"></select>
        </div>
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">U</div>
          <span id="userEmail" class="user-email-text"></span>
        </div>
        <button class="btn-logout" onclick="doLogout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          Esci
        </button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main-wrap">

      <!-- DASHBOARD PAGE -->
      <div id="page-dashboard" class="page active">
        <div class="page-header">
          <div>
            <h1 id="dashTitle">Dashboard</h1>
            <p class="page-sub" id="dashSub"></p>
          </div>
        </div>
        <div class="summary-grid" id="summaryCards"></div>
        <div class="two-col">
          <div class="card">
            <div class="card-header">
              <h3>Profitto per camion</h3>
            </div>
            <div class="chart-wrap"><canvas id="profitChart" role="img" aria-label="Profitto per camion"></canvas></div>
          </div>
          <div class="card">
            <div class="card-header"><h3>Ripartizione costi</h3></div>
            <div class="chart-wrap"><canvas id="costiChart" role="img" aria-label="Ripartizione costi"></canvas></div>
          </div>
        </div>
        <div class="card" style="margin-top:16px">
          <div class="card-header"><h3>Ultimi viaggi</h3></div>
          <div id="recentTrips"></div>
        </div>
      </div>

      <!-- VIAGGI PAGE -->
      <div id="page-viaggi" class="page">
        <div class="page-header">
          <div>
            <h1>Viaggi</h1>
            <p class="page-sub" id="viaggiSub"></p>
          </div>
          <button class="btn-primary" onclick="openTripModal()">+ Nuovo viaggio</button>
        </div>
        <div class="card">
          <div class="card-header" style="margin-bottom:12px">
            <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
              <select id="filterTruck" onchange="renderViagg()" style="font-size:13px">
                <option value="">Tutti i camion</option>
              </select>
              <input type="text" id="filterSearch" placeholder="Cerca cliente, rotta..." oninput="renderViagg()" style="font-size:13px;padding:6px 10px;min-width:180px">
            </div>
            <span class="trip-count" id="tripCount"></span>
          </div>
          <div id="tripTable"></div>
        </div>
      </div>

      <!-- STORICO PAGE -->
      <div id="page-storico" class="page">
        <div class="page-header">
          <h1>Storico annuale</h1>
        </div>
        <div class="summary-grid" id="storicoCards"></div>
        <div class="card" style="margin-top:16px">
          <div class="card-header"><h3>Profitto mensile</h3></div>
          <div class="chart-wrap" style="height:300px"><canvas id="storicoChart" role="img" aria-label="Storico mensile"></canvas></div>
        </div>
        <div class="card" style="margin-top:16px">
          <div class="card-header"><h3>Dettaglio mesi</h3></div>
          <div id="storicoTable"></div>
        </div>
      </div>


      <!-- COSTI PAGE -->
      <div id="page-costi" class="page">
        <div class="page-header">
          <div>
            <h1>Costi</h1>
            <p class="page-sub" id="costiSub"></p>
          </div>
          <button class="btn-primary" onclick="openCostoModal()">+ Nuovo costo</button>
        </div>
        <div class="summary-grid" id="costiSummary"></div>
        <div class="card" style="margin-top:4px">
          <div class="card-header" style="margin-bottom:12px">
            <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
              <select id="filterCostoTruck" onchange="renderCosti()" style="font-size:13px"><option value="">Tutti i camion</option></select>
              <select id="filterCostoCategoria" onchange="renderCosti()" style="font-size:13px"><option value="">Tutte le categorie</option><option>Gasolio</option><option>Autista</option><option>Manutenzione</option><option>Pedaggi</option><option>Assicurazione</option><option>Ammortamento</option><option>Altro</option></select>
              <input type="text" id="filterCostoSearch" placeholder="Cerca descrizione..." oninput="renderCosti()" style="font-size:13px;padding:6px 10px;min-width:160px">
            </div>
            <span class="trip-count" id="costoCount"></span>
          </div>
          <div id="costoTable"></div>
        </div>
      </div>

      <!-- CAMION PAGE -->
      <div id="page-camion" class="page">
        <div class="page-header">
          <div><h1>Camion</h1><p class="page-sub">Costi fissi mensili per veicolo</p></div>
          <button class="btn-primary" onclick="addTruck()">+ Aggiungi camion</button>
        </div>
        <div id="truckList"></div>
      </div>

    </main>
  </div>

  <!-- TRIP MODAL -->
  <div id="tripModal" class="modal-overlay" style="display:none" onclick="closeTripModalOutside(event)">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modalTitle">Nuovo viaggio</h3>
        <button class="modal-close" onclick="closeTripModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group">
            <label>Camion</label>
            <select id="tripTruck"></select>
          </div>
          <div class="form-group">
            <label>Data</label>
            <input type="date" id="tripDate">
          </div>
          <div class="form-group">
            <label>Origine</label>
            <input type="text" id="tripFrom" placeholder="es. Milano">
          </div>
          <div class="form-group">
            <label>Destinazione</label>
            <input type="text" id="tripTo" placeholder="es. Roma">
          </div>
          <div class="form-group">
            <label>Cliente / Committente</label>
            <input type="text" id="tripClient" placeholder="es. Acme Srl">
          </div>
          <div class="form-group">
            <label>Peso / Tipo container</label>
            <input type="text" id="tripContainer" placeholder="es. 20t — 40ft HC">
          </div>
          <div class="form-group">
            <label>Km percorsi</label>
            <input type="number" id="tripKm" placeholder="0" min="0">
          </div>
          <div class="form-group">
            <label>Importo fatturato (€)</label>
            <input type="number" id="tripAmount" placeholder="0" min="0">
          </div>
        </div>
        <div class="form-group" style="margin-top:8px">
          <label>Note</label>
          <input type="text" id="tripNotes" placeholder="Note aggiuntive...">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeTripModal()">Annulla</button>
        <button class="btn-primary" onclick="saveTrip()">Salva viaggio</button>
      </div>
    </div>
  </div>

  <!-- COSTO MODAL -->
  <div id="costoModal" class="modal-overlay" style="display:none" onclick="closeCostoModalOutside(event)">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="costoModalTitle">Nuovo costo</h3>
        <button class="modal-close" onclick="closeCostoModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group"><label>Camion</label><select id="costoTruck"></select></div>
          <div class="form-group"><label>Data</label><input type="date" id="costoDate"></div>
          <div class="form-group"><label>Categoria</label><select id="costoCategoria"><option>Gasolio</option><option>Autista</option><option>Manutenzione</option><option>Pedaggi</option><option>Assicurazione</option><option>Ammortamento</option><option>Altro</option></select></div>
          <div class="form-group"><label>Importo (€)</label><input type="number" id="costoImporto" placeholder="0" min="0"></div>
          <div class="form-group" style="grid-column:1/-1"><label>Descrizione</label><input type="text" id="costoDescrizione" placeholder="es. Riparazione freni, rifornimento..."></div>
          <div class="form-group" style="grid-column:1/-1"><label>Note</label><input type="text" id="costoNote" placeholder="Note aggiuntive..."></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeCostoModal()">Annulla</button>
        <button class="btn-primary" onclick="saveCosto()">Salva costo</button>
      </div>
    </div>
  </div>

  <div id="saveToast" class="toast">Salvato ✓</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
